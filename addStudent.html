<!DOCTYPE html>
<html>
<head>
<title>Add Student</title>

<style>
body {
    font-family: 'Segoe UI', Arial;
    margin: 0;
    background: linear-gradient(135deg, #dfe9f3, #ffffff);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* SIDE CURVES DESIGN */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: #90caf9;
    border-radius: 50%;
    opacity: 0.3;
}

body::before {
    top: -100px;
    left: -100px;
}

body::after {
    bottom: -100px;
    right: -100px;
}

/* CARD */
.container {
    position: relative;
    width: 400px;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #1e3a8a;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
    transition: 0.2s;
}

input:focus, select:focus {
    border-color: #42a5f5;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #42a5f5;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #1e88e5;
}
</style>

</head>

<body>

<div class="container">

<h2>Add Student</h2>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="department" placeholder="Department">
<input id="year" placeholder="Year">
<input id="phone" placeholder="Phone">
<input id="Subjects" placeholder="Subjects">
<input id="Notices" placeholder="Notices">
<input id="Exams" placeholder="Exams">
<select id="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<button onclick="addStudent()">Add Student</button>

</div>

<script>

function addStudent(){

    const student = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        department: document.getElementById("department").value,
        year: document.getElementById("year").value,
        phone: document.getElementById("phone").value,
        gender: document.getElementById("gender").value,
        
    };

    fetch("http://localhost:5000/api/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(student)
    })
    .then(res => res.json())
    .then(data => {

        if(data.success){
            alert("Student Added ✅");
            window.location.href = "adminDashboard.html";
        } else {
            alert(data.message || "Failed ❌");
        }

    })
    .catch(err => {
        console.error("Error:", err);
        alert("Server Error ❌");
    });
}

</script>

</body>
</html>
