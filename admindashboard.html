<!DOCTYPE html>
<html>
<head>
    <title>Manage Student Data</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: red;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .top-actions {
            text-align: center;
            margin-bottom: 15px;
        }

        .add-btn {
            padding: 10px 15px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            margin: 5px;
        }

        .msg-btn {
            padding: 10px 15px;
            background: #1e40af;
            color: white;
            border: none;
            cursor: pointer;
            margin: 5px;
        }

        .notice-btn {
            padding: 10px 15px;
            background: purple;
            color: white;
            border: none;
            cursor: pointer;
            margin: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        .filters {
            margin-bottom: 20px;
            text-align: center;
        }

        select, input, button {
            padding: 8px;
            margin: 5px;
        }

        .edit-btn {
            background: orange;
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
        }

        .mark-btn {
            background: #42a5f5;
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
            margin-left: 5px;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
            margin-left: 5px;
        }
    </style>
</head>

<body>

<button class="logout-btn" onclick="logout()">Logout</button>

<h2>Manage Student Data</h2>

<div class="top-actions">
    <button class="add-btn" onclick="openAddStudent()">Add Student</button>
    <button class="msg-btn" onclick="openMessages()">View Messages</button>
    <button class="notice-btn" onclick="openNoticePage()">Add Notice</button>
</div>

<div class="filters">
    <select id="yearFilter">
        <option value="">All Years</option>
        <option value="1">1st Year</option>
        <option value="2">2nd Year</option>
        <option value="3">3rd Year</option>
        <option value="4">4th Year</option>
    </select>

    <select id="deptFilter">
        <option value="">All Departments</option>
        <option value="CSE">CSE</option>
        <option value="ECE">ECE</option>
        <option value="EEE">EEE</option>
        <option value="AIML">AIML</option>
        <option value="MECH">MECH</option>
    </select>

    <input type="number" id="attendanceFilter" placeholder="Below %" />

    <button onclick="applyFilters()">Apply Filter</button>
    <button onclick="resetFilters()">Reset</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Year</th>
<th>Gender</th>
<th>Phone</th>
<th>Attendance %</th>
<th>Action</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>
</table>

<script>

let allStudents = [];

document.addEventListener("DOMContentLoaded", loadStudents);

// LOAD
function loadStudents(){
    fetch("http://localhost:5000/api/admin/students")
    .then(res => res.json())
    .then(data => {
        allStudents = data;
        displayStudents(data);
    });
}

// DISPLAY
function displayStudents(data){
    const table = document.getElementById("studentTable");
    table.innerHTML = "";

    data.forEach(student => {

        let totalPresent = 0;
        let totalClasses = 0;

        if(student.attendance){
            student.attendance.forEach(sub => {
                totalPresent += sub.present || 0;
                totalClasses += sub.total || 0;
            });
        }

        let percentage = totalClasses > 0 
            ? ((totalPresent / totalClasses) * 100).toFixed(1)
            : "0";

        table.innerHTML += `
        <tr>
            <td>${student.name}</td>
            <td>${student.email}</td>
            <td>${student.department}</td>
            <td>${student.year}</td>
            <td>${student.gender}</td>
            <td>${student.phone}</td>
            <td>${percentage}%</td>
            <td>
                <button class="edit-btn" onclick="openEditStudent('${student._id}')">Edit</button>

                <button class="mark-btn" onclick="openMarkPage('${student._id}')">Mark</button>

                <button class="delete-btn" onclick="deleteStudent('${student._id}')">Delete</button>
            </td>
        </tr>
        `;
    });
}

// DELETE
function deleteStudent(id){
    if(!confirm("Delete this student? ❌")) return;

    fetch("http://localhost:5000/api/admin/students/" + id, {
        method: "DELETE"
    })
    .then(res => res.json())
    .then(() => {
        alert("Deleted ✅");
        loadStudents();
    });
}

// EDIT STUDENT
function openEditStudent(id){
    window.location.href = "attendanceEdit.html?id=" + id;
}

// FILTER
function applyFilters(){
    let year = yearFilter.value;
    let dept = deptFilter.value;
    let att = attendanceFilter.value;

    let filtered = allStudents.filter(student => {

        let totalPresent = 0;
        let totalClasses = 0;

        if(student.attendance){
            student.attendance.forEach(sub => {
                totalPresent += sub.present || 0;
                totalClasses += sub.total || 0;
            });
        }

        let percentage = totalClasses > 0 
            ? (totalPresent / totalClasses) * 100
            : 0;

        return (
            (year === "" || student.year == year) &&
            (dept === "" || student.department === dept) &&
            (att === "" || percentage < att)
        );
    });

    displayStudents(filtered);
}

// RESET
function resetFilters(){
    displayStudents(allStudents);
}

// NAV
function openAddStudent(){
    window.location.href = "addStudent.html";
}

function openMarkPage(id){
    window.location.href = "markAttendance.html?id=" + id;
}

function openMessages(){
    window.location.href = "adminMessages.html";
}

function openNoticePage(){
    window.location.href = "addNotice.html";
}

// LOGOUT
function logout(){
    localStorage.clear();
    window.location.href = "login.html";
}

</script>

</body>
</html>
