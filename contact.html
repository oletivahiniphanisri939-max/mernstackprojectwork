<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us | CampusPulse</title>

<style>
body {
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #dbeafe, #eef2ff);
margin: 0;
padding: 0;
position: relative;
overflow-x: hidden;
}

body::before,
body::after {
content: "";
position: absolute;
top: 0;
width: 300px;
height: 100%;
background: linear-gradient(180deg, #93c5fd, #c7d2fe);
opacity: 0.4;
z-index: -1;
}

body::before {
left: 0;
border-top-right-radius: 200px;
border-bottom-right-radius: 200px;
}

body::after {
right: 0;
border-top-left-radius: 200px;
border-bottom-left-radius: 200px;
}

.container {
width: 600px;
margin: 60px auto;
background-color: #ffffff;
padding: 25px;
border-radius: 10px;
box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

h2 { text-align: center; color: #1e3a8a; }
h3 { color: #1e40af; }

input, textarea {
width: 100%;
padding: 10px;
margin-bottom: 15px;
border: 1px solid #c7d2fe;
border-radius: 6px;
}

button {
background-color: #1e40af;
color: white;
padding: 10px 18px;
border: none;
border-radius: 6px;
cursor: pointer;
}

button:hover { background-color: #1e3a8a; }
button:disabled { background: gray; cursor: not-allowed; }

.msg {
text-align: center;
margin-top: 10px;
font-weight: bold;
display: none;
}

.success { color: green; }
.error { color: red; }
</style>
</head>

<body>

<script>
if(localStorage.getItem("isLoggedIn") !== "true"){
    alert("Please login first");
    window.location.href = "login.html";
}
</script>

<div class="container">

<h2>Contact Us</h2>

<p><strong>College Name:</strong> Visionary College</p>
<p><strong>Address:</strong> Vijayawada, Andhra Pradesh, India</p>
<p><strong>Phone:</strong> +91 98765 43210</p>
<p><strong>Email:</strong> info@visionarycollege.edu</p>

<hr>

<h3>Send Us a Message</h3>

<form onsubmit="sendMessage(event)">

<label>Name:</label>
<input type="text" id="name" required>

<label>Email:</label>
<input type="email" id="email" required>

<label>Message:</label>
<textarea id="message" rows="4" required></textarea>

<button id="sendBtn" type="submit">Send</button>

<p id="successMsg" class="msg success">✅ Message sent successfully!</p>
<p id="errorMsg" class="msg error">❌ Failed to send message</p>

</form>

<br>

<center>
<a href="homepage.html"
style="text-decoration:none; background:#1e40af; color:white; padding:8px 18px; border-radius:6px;">
⬅ Back to Home
</a>
</center>

</div>

<script>

// AUTO FILL
window.onload = () => {
    document.getElementById("name").value = localStorage.getItem("name") || "";
    document.getElementById("email").value = localStorage.getItem("email") || "";
};

function sendMessage(event){
    event.preventDefault();

    const btn = document.getElementById("sendBtn");
    const success = document.getElementById("successMsg");
    const error = document.getElementById("errorMsg");

    success.style.display = "none";
    error.style.display = "none";

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    if(!name || !email || !message){
        error.innerText = "⚠️ All fields required";
        error.style.display = "block";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Sending...";

    fetch("http://localhost:5000/api/contact", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, message })
    })
    .then(async res => {

        // 🔥 FIX (important)
        const data = await res.json();

        if(res.ok && data.success){
            success.style.display = "block";
            document.getElementById("message").value = "";
        } else {
            throw new Error(data.message || "Failed");
        }

    })
    .catch(err => {
        console.error(err);
        error.innerText = err.message || "Server error ❌";
        error.style.display = "block";
    })
    .finally(() => {
        btn.disabled = false;
        btn.innerText = "Send";
    });
}

</script>

</body>
</html>
