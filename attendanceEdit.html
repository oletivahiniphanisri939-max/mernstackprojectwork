<!DOCTYPE html>
<html>
<head>
<title>Edit Student + Attendance</title>

<style>
body {
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(135deg, #e3f2fd, #f1f8ff);
    margin: 0;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.save-btn {
    background: #4CAF50;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
}

.container {
    width: 700px;
    margin: 40px auto;
}

.student-box {
    background: white;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 10px;
}

.student-box input {
    width: 48%;
    margin: 5px 1%;
}

.row {
    display: flex;
    align-items: center;
    background: white;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 10px;
}

input {
    padding: 9px;
    margin-right: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

.remove-btn {
    margin-left: auto;
    background: none;
    border: none;
    color: red;
    font-size: 18px;
    cursor: pointer;
}

.add-btn {
    margin-top: 15px;
    background: #42a5f5;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>Edit Student + Attendance</h2>
    <button class="save-btn" onclick="saveAll()">Save</button>
</div>

<div class="container">

<div class="student-box">
    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email"><br>
    <input id="phone" placeholder="Phone">
    <input id="department" placeholder="Department"><br>
    <input id="year" placeholder="Year">
</div>

<div id="attendanceContainer"></div>

<button class="add-btn" onclick="addRow()">+ Add Subject</button>

</div>

<script>

const studentId = new URLSearchParams(window.location.search).get("id");

if(!studentId){
    alert("Student ID missing ❌");
}

// ADD ROW
function addRow(subject="", total="", present=""){
    const div = document.createElement("div");
    div.classList.add("row");

    div.innerHTML = `
        <input placeholder="Subject" value="${subject}">
        <input type="number" placeholder="Total" value="${total}">
        <input type="number" placeholder="Present" value="${present}">
        <button class="remove-btn" onclick="this.parentElement.remove()">✖</button>
    `;

    document.getElementById("attendanceContainer").appendChild(div);
}


// ✅ FINAL FIXED SAVE FUNCTION
async function saveAll(){

    try{

        const studentData = {
            name: document.getElementById("name").value.trim(),
            email: document.getElementById("email").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            department: document.getElementById("department").value.trim(),
            year: document.getElementById("year").value.trim()
        };

        let attendance = [];

        document.querySelectorAll(".row").forEach(row => {
            let i = row.querySelectorAll("input");

            if(i[0].value.trim()){
                attendance.push({
                    subject: i[0].value.trim(),
                    total: Number(i[1].value) || 0,
                    present: Number(i[2].value) || 0
                });
            }
        });

        // 🔥 UPDATE STUDENT
        const res1 = await fetch(`http://localhost:5000/api/admin/students/${studentId}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(studentData)
        });

        const data1 = await res1.json();

        if(!data1.success){
            throw new Error(data1.message || "Student update failed");
        }

        // 🔥🔥🔥 MAIN FIX HERE
        const res2 = await fetch(`http://localhost:5000/api/admin/students/attendance/${studentId}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ attendance })
        });

        const data2 = await res2.json();

        if(!data2.success){
            throw new Error(data2.message || "Attendance update failed");
        }

        alert("Updated Successfully ✅");
        window.location.href = "admindashboard.html";

    }catch(err){
        console.error(err);
        alert("Update Failed ❌");
    }
}


// LOAD DATA
fetch(`http://localhost:5000/api/profile/${studentId}`)
.then(res => res.json())
.then(data => {

    const s = data.student || data;

    document.getElementById("name").value = s.name || "";
    document.getElementById("email").value = s.email || "";
    document.getElementById("phone").value = s.phone || "";
    document.getElementById("department").value = s.department || "";
    document.getElementById("year").value = s.year || "";

    if(s.attendance && s.attendance.length > 0){
        s.attendance.forEach(sub => {
            addRow(sub.subject, sub.total, sub.present);
        });
    } else {
        addRow();
    }

})
.catch(err=>{
    console.error(err);
    alert("Failed to load student data ❌");
});

</script>

</body>
</html>
