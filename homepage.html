<!DOCTYPE html>
<html>
<head>
    <title>CampusPlus - Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .sidebar {
            height: 100vh;
            width: 220px;
            background-color: #2c3e50;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 20px;
        }

        .sidebar h2 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 15px;
            text-decoration: none;
            font-size: 18px;
        }

        .sidebar a:hover {
            background-color: #34495e;
        }
        .main-content {
            margin-left: 220px;
            padding: 20px;
        }

        .image-container {
            position: relative;
            width: 1200px;
            height:800px;
        }

        .image-container img {
            width: 100%;
            height: auto;
        }

        .college-text {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 32px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<!-- SIDE MENU -->
<div class="sidebar">
    <h2>CampusPlus</h2>
    <a href="homepage.html">Home</a>
    <a href="login.html">Login</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="attendance.html">Attendance</a>

    

    <a href="notices.html">Notices</a>
    <a href="contact.html">Contact</a>
    <a href="profile.html">Profile</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <h1><marquee>Visionary College</marquee></h1>
    <h2>CampusPlus – College Management Portal</h2>

    <div class="image-container">
        <img src="home.jpeg" alt="College Image">
        <div class="college-text">Visionary College</div>
    </div>

</div>
<!-- ✅ LOGIN CHECK SCRIPT -->
<script>


function logout(){
    localStorage.removeItem("isLoggedIn");
    localStorage.removeItem("studentEmail");
    window.location.href = "login.html";
}

if(localStorage.getItem("isLoggedIn") !== "true"){
    alert("Please login first");
    window.location.href = "login.html";
}

</script>
</body>
</html>
